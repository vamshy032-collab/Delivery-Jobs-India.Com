padding:35px;

}

/*=========================================

=========================================*/

display:flex;

justify-content:space-between;

align-items:center;

padding:25px;

border-radius:18px;

box-shadow:var(--shadow);

margin-bottom:30px;

}

.header h1{

font-size:32px;

font-weight:700;

color:#111827;

}

.home-btn{

background:#ff7a00;

/*=========================================

=========================================*/

.jobs-grid{

display:grid;

grid-template-columns:
repeat(auto-fill,minmax(330px,1fr));

/*=========================================

=========================================*/

border-radius:18px;

padding:25px;

.job-title{

.status{

padding:50px;

<script>

/*=========================================
        SUPABASE CONNECTION
=========================================*/

const SUPABASE_URL = "https://xeraljvxmfpwyenkiebb.supabase.co";

const SUPABASE_KEY = "sb_publishable_Zypr-BL-TfIInUlHt6FhKw_Svt8baSU";

const sb = window.supabase.createClient(
    SUPABASE_URL,
    SUPABASE_KEY
);

/*=========================================
        LOAD APPLIED JOBS
=========================================*/

async function loadAppliedJobs(){

    const userId = localStorage.getItem("userId");

    if(!userId){

        alert("Please Login First");

        window.location.href="login.html";

        return;

    }

    const { data, error } = await sb
        .from("job_applications")
        .select("*")
        .eq("user_id", userId)
        .order("created_at", { ascending:false });

    if(error){

        console.log(error);

        return;

    }

    const jobsContainer =
        document.getElementById("jobsContainer");

    jobsContainer.innerHTML = "";
    /*=========================================
            NO JOBS
    =========================================*/

    if(data.length === 0){

        jobsContainer.innerHTML = `

        <div class="empty-box">

            <i class="fa-solid fa-file-circle-xmark"></i>

            <h2>

                No Applied Jobs

            </h2>

            <p>

                You haven't applied for any jobs yet.

            </p>

        </div>

        `;

        return;

    }

    /*=========================================
            DISPLAY JOBS
    =========================================*/

    data.forEach(job=>{

        jobsContainer.innerHTML += `

        <div class="job-card">

            <div class="company">

                ${job.company_name}

            </div>

            <div class="job-title">

                ${job.job_title}

            </div>

            <div class="info">

                📍 <b>Location :</b>

                ${job.location}

            </div>

            <div class="info">

                💰 <b>Salary :</b>

                ${job.salary}

            </div>

            <div class="info">

                📅 <b>Applied :</b>

                ${new Date(job.created_at).toLocaleDateString()}

            </div>

            <div class="status">

                ✅ ${job.status}

            </div>

        </div>

        `;

    });

}
/*=========================================
        LOGOUT
=========================================*/

const logoutBtn = document.getElementById("logoutBtn");

if(logoutBtn){

    logoutBtn.addEventListener("click",function(e){

        e.preventDefault();

        const logout = confirm(
            "Are you sure you want to logout?"
        );

        if(!logout) return;

        localStorage.clear();

        sessionStorage.clear();

        window.location.href = "index.html";

    });

}

/*=========================================
        PAGE LOAD
=========================================*/

window.addEventListener("load",()=>{

    loadAppliedJobs();

    console.log("Applied Jobs Loaded Successfully");

});

</script>
