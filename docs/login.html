<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Delivery Jobs India | Login with OTP</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }
        html { scroll-behavior: smooth; }
        body {
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg, #0f172a, #1e293b, #334155);
            overflow-x: hidden;
        }
        :root {
            --primary: #ff7a00;
            --primary-dark: #e56700;
            --white: #ffffff;
            --text: #1f2937;
            --gray: #6b7280;
            --border: #e5e7eb;
            --shadow: 0 20px 60px rgba(0,0,0,.25);
        }
        .bg-circle {
            position: absolute;
            border-radius: 50%;
            filter: blur(20px);
            opacity: .25;
        }
        .bg1 { width: 300px; height: 300px; background: #ff7a00; top: -100px; left: -80px; }
        .bg2 { width: 250px; height: 250px; background: #3b82f6; bottom: -80px; right: -80px; }
        .login-card {
            position: relative;
            width: 100%;
            max-width: 430px;
            background: #fff;
            border-radius: 25px;
            padding: 40px;
            box-shadow: var(--shadow);
            z-index: 5;
            animation: fadeIn .7s ease;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .logo { display: flex; justify-content: center; align-items: center; margin-bottom: 30px; }
        .logo img { width: 140px; height: auto; display: block; object-fit: contain; }
        .title { text-align: center; margin-bottom: 30px; }
        .title h2 { font-size: 32px; font-weight: 700; color: var(--text); }
        .title span { color: var(--primary); }
        .title p { margin-top: 10px; font-size: 15px; color: var(--gray); }
        .form-group { margin-bottom: 20px; }
        .form-group label { display: block; margin-bottom: 8px; font-size: 15px; font-weight: 600; color: var(--text); }
        .form-control {
            width: 100%;
            height: 55px;
            padding: 0 18px;
            border: 1px solid var(--border);
            border-radius: 12px;
            font-size: 15px;
            outline: none;
            transition: .3s;
        }
        .form-control:focus { border-color: var(--primary); box-shadow: 0 0 0 3px rgba(255,122,0,.15); }
        .send-btn, .verify-btn {
            width: 100%;
            height: 55px;
            border: none;
            border-radius: 12px;
            background: var(--primary);
            color: #fff;
            font-size: 17px;
            font-weight: 600;
            cursor: pointer;
            transition: .3s;
        }
        .send-btn:hover, .verify-btn:hover { background: var(--primary-dark); }
        .send-btn:disabled, .verify-btn:disabled { background: #ccc; cursor: not-allowed; }
        .error { display: none; margin-top: 10px; font-size: 14px; color: #dc2626; font-weight: 500; }
        .otp-section { display: none; margin-top: 30px; }
        .otp-title { text-align: center; margin-bottom: 20px; }
        .otp-title h3 { font-size: 22px; color: var(--text); }
        .otp-title p { margin-top: 8px; color: var(--gray); }
        .otp-inputs { display: flex; justify-content: space-between; gap: 12px; margin-bottom: 25px; }
        .otp-input {
            width: 60px;
            height: 60px;
            border: 2px solid var(--border);
            border-radius: 12px;
            text-align: center;
            font-size: 24px;
            font-weight: 700;
            outline: none;
            transition: .3s;
        }
        .otp-input:focus { border-color: var(--primary); box-shadow: 0 0 0 3px rgba(255,122,0,.15); }
        .resend, .change-number { text-align: center; margin-top: 18px; }
        .resend a, .change-number a { text-decoration: none; color: var(--primary); font-weight: 600; cursor: pointer; }
        .resend a:hover, .change-number a:hover { text-decoration: underline; }
        .back-home { margin-top: 25px; text-align: center; }
        .back-home a { text-decoration: none; color: #6b7280; font-size: 14px; font-weight: 500; }
        .back-home a:hover { color: var(--primary); }
        .footer-text { margin-top: 30px; text-align: center; font-size: 13px; color: #9ca3af; line-height: 22px; }
        @media(max-width: 768px) {
            .login-card { width: 92%; padding: 30px 25px; }
            .title h2 { font-size: 28px; }
            .logo img { width: 75px; }
            .otp-input { width: 52px; height: 52px; font-size: 22px; }
        }
        @media(max-width: 480px) {
            .login-card { padding: 25px 20px; }
            .title h2 { font-size: 24px; }
            .form-control, .send-btn, .verify-btn { height: 50px; }
            .otp-input { width: 45px; height: 50px; font-size: 20px; }
        }
    </style>
</head>
<body>
    <div class="bg-circle bg1"></div>
    <div class="bg-circle bg2"></div>

    <div class="login-card">
        <div class="logo">
            <img src="logo.png" alt="Delivery Jobs India Logo">
        </div>

        <div class="title">
            <h2>Welcome <span>Back</span></h2>
            <p>Login with your Mobile Number</p>
        </div>

        <form id="loginForm">
            <div class="form-group">
                <label>Mobile Number</label>
                <input type="text" class="form-control" id="loginInput" placeholder="Enter Mobile Number" required>
                <div class="error" id="loginError">Please enter a valid 10 digit Mobile Number.</div>
            </div>
            <button type="submit" class="send-btn">Send OTP</button>
        </form>

        <div class="otp-section" id="otpSection">
            <div class="otp-title">
                <h3>OTP Verification</h3>
                <p>Enter the 4 digit OTP sent to <strong id="userValue"></strong></p>
            </div>
            <div class="otp-inputs">
                <input type="text" maxlength="1" class="otp-input">
                <input type="text" maxlength="1" class="otp-input">
                <input type="text" maxlength="1" class="otp-input">
                <input type="text" maxlength="1" class="otp-input">
            </div>
            <div class="error" id="otpError">Invalid OTP. Please try again.</div>
            <button class="verify-btn" id="verifyBtn">Verify OTP</button>
            <div class="resend"><a href="#" id="resendOtp">Resend OTP</a></div>
            <div class="change-number"><a href="#" id="changeNumber">Change Mobile Number</a></div>
        </div>

        <div class="back-home">
            <a href="index.html">← Back to Home</a>
        </div>

        <div class="footer-text">
            © 2026 Delivery Jobs India<br>
            Secure Login with OTP
        </div>
    </div>

<script>
// ==============================
// Configuration
// ==============================

const SUPABASE_URL = "https://xeraljvxmfpwyenkiebb.supabase.co";
const SUPABASE_KEY = "sb_publishable_Zypr-BL-TfIInUlHt6FhKw_Svt8baSU";

// Backend API URL - Update this for production deployment
// For local: http://localhost:5000/api
// For production: https://your-backend-url.com/api
const API_URL = "http://localhost:5000/api";

const sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

// ==============================
// Variables
// ==============================

const loginForm = document.getElementById("loginForm");
const loginInput = document.getElementById("loginInput");
const loginError = document.getElementById("loginError");
const otpError = document.getElementById("otpError");
const sendBtn = document.querySelector(".send-btn");
const verifyBtn = document.getElementById("verifyBtn");
const userValue = document.getElementById("userValue");
const otpSection = document.getElementById("otpSection");
const otpInputs = document.querySelectorAll(".otp-input");

let currentUser = null;
const mobilePattern = /^[6-9]\d{9}$/;

// ==============================
// Helper Functions
// ==============================

function setButtonLoading(button, text, isLoading) {
    button.disabled = isLoading;
    button.innerText = isLoading ? text : (button.dataset.originalText || button.innerText);
}

function showError(element, message) {
    element.innerText = message;
    element.style.display = "block";
}

function hideError(element) {
    element.style.display = "none";
}

// ==============================
// Find or Create User in Database
// ==============================

async function findOrCreateUser(mobile) {
    const { data: existingUser, error: findError } = await sb
        .from("users")
        .select("id, phone, email, login_type, is_verified, last_login")
        .eq("phone", mobile)
        .maybeSingle();

    if (findError) console.error("Find user error:", findError);

    if (existingUser) return existingUser;

    const { data: newUser, error: createError } = await sb
        .from("users")
        .insert([{
            phone: mobile,
            email: mobile + "@deliveryjobsindia.local",
            login_type: "PHONE",
            is_verified: false
        }])
        .select("id, phone, email, login_type, is_verified, last_login")
        .single();

    if (createError) throw createError;
    return newUser;
}

// ==============================
// OTP Storage (for demo when backend unavailable)
// ==============================

let generatedOtp = "";

// ==============================
// Send OTP via Backend (MSG91)
// ==============================

async function sendOtpViaApi(mobile) {
    try {
        const response = await fetch(`${API_URL}/msg91/send-otp`, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ mobile: mobile, purpose: "login" })
        });

        const result = await response.json();
        
        if (!result.success) {
            throw new Error(result.message || "Failed to send OTP");
        }

        return result;
    } catch (error) {
        console.error("Backend not available, using local OTP");
        // Fallback - generate local OTP
        generatedOtp = Math.floor(1000 + Math.random() * 9000).toString();
        return { success: true, demo_mode: true, otp: generatedOtp };
    }
}

// ==============================
// Verify OTP via Backend
// ==============================

async function verifyOtpViaApi(mobile, otp) {
    try {
        const response = await fetch(`${API_URL}/msg91/verify-otp`, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ mobile: mobile, otp: otp })
        });

        return await response.json();
    } catch (error) {
        console.error("Backend not available, verifying locally");
        // Fallback - verify locally
        if (otp === generatedOtp) {
            return { success: true };
        } else {
            return { success: false, message: "Invalid OTP" };
        }
    }
}

// ==============================
// Start OTP Login
// ==============================

async function startOtpLogin(mobile) {
    currentUser = await findOrCreateUser(mobile);
    const result = await sendOtpViaApi(mobile);

    userValue.innerHTML = "+91 " + mobile;
    loginForm.style.display = "none";
    otpSection.style.display = "block";
    otpInputs[0].focus();

    // Demo mode - show OTP in alert
    if (result.demo_mode && result.otp) {
        alert("OTP Sent Successfully!\n\nDemo Mode - Your OTP: " + result.otp);
    } else {
        alert("OTP Sent Successfully to +91 " + mobile);
    }
}

// ==============================
// Form Submit - Send OTP
// ==============================

loginForm.addEventListener("submit", async function (e) {
    e.preventDefault();

    const mobile = loginInput.value.trim();

    if (!mobilePattern.test(mobile)) {
        showError(loginError, "Please enter a valid 10 digit Mobile Number.");
        return;
    }

    hideError(loginError);
    hideError(otpError);
    
    sendBtn.dataset.originalText = sendBtn.innerText;
    setButtonLoading(sendBtn, "Sending...", true);

    try {
        await startOtpLogin(mobile);
    } catch (error) {
        showError(loginError, error.message || "Failed to send OTP. Please try again.");
    } finally {
        setButtonLoading(sendBtn, "Resend OTP", false);
    }
});

// ==============================
// OTP Auto Move
// ==============================

otpInputs.forEach((input, index) => {
    input.addEventListener("input", function() {
        this.value = this.value.replace(/[^0-9]/g, '');
        if (this.value.length === 1 && index < otpInputs.length - 1) {
            otpInputs[index + 1].focus();
        }
    });

    input.addEventListener("keydown", function(e) {
        if (e.key === "Backspace" && this.value === "" && index > 0) {
            otpInputs[index - 1].focus();
        }
    });
});

// ==============================
// Resend OTP
// ==============================

document.getElementById("resendOtp").addEventListener("click", async function(e) {
    e.preventDefault();
    const mobile = loginInput.value.trim();
    if (!mobilePattern.test(mobile)) return;

    try {
        await sendOtpViaApi(mobile);
        alert("New OTP Sent Successfully!");
    } catch (error) {
        showError(otpError, "Failed to resend OTP. Please try again.");
    }
});

// ==============================
// Change Number
// ==============================

document.getElementById("changeNumber").addEventListener("click", function(e) {
    e.preventDefault();
    loginForm.reset();
    otpInputs.forEach(box => box.value = "");
    otpSection.style.display = "none";
    loginForm.style.display = "block";
    currentUser = null;
    hideError(otpError);
    loginInput.focus();
});

// ==============================
// Verify OTP + Login
// ==============================

document.getElementById("verifyBtn").addEventListener("click", async function() {
    const otp = [...document.querySelectorAll(".otp-input")].map(x => x.value).join("");

    if (otp.length !== 4) {
        showError(otpError, "Please enter 4 digit OTP.");
        return;
    }

    hideError(otpError);
    verifyBtn.dataset.originalText = verifyBtn.innerText;
    setButtonLoading(verifyBtn, "Verifying...", true);

    try {
        const verifyResult = await verifyOtpViaApi(loginInput.value.trim(), otp);

        if (!verifyResult.success) {
            showError(otpError, verifyResult.message || "Invalid OTP");
            return;
        }

        if (!currentUser) {
            currentUser = await findOrCreateUser(loginInput.value.trim());
        }

        await sb.from("users").update({
            is_verified: true,
            last_login: new Date().toISOString()
        }).eq("id", currentUser.id);

        localStorage.setItem("isLoggedIn", "true");
        localStorage.setItem("userId", currentUser.id);
        localStorage.setItem("userMobile", currentUser.phone || loginInput.value.trim());
        localStorage.setItem("userName", "Delivery Partner");
        localStorage.setItem("userEmail", currentUser.email || "");

        alert("Login Successful!");
        window.location.href = "home.html";

    } catch (error) {
        console.error("Login error:", error);
        showError(otpError, error.message || "Login failed. Please try again.");
    } finally {
        setButtonLoading(verifyBtn, "Verify OTP", false);
    }
});
</script>
</body>
</html>
