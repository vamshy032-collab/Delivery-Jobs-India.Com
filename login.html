<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Delivery Jobs India | Login with OTP</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins',sans-serif;
}

html{
    scroll-behavior:smooth;
}

body{

    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:linear-gradient(135deg,#0f172a,#1e293b,#334155);
    overflow:hidden;
    overflow-x: hidden;

}

/*==========================
        COLORS
==========================*/

:root{

--primary:#ff7a00;
--primary-dark:#e56700;
--white:#ffffff;
--text:#1f2937;
--gray:#6b7280;
--border:#e5e7eb;
--shadow:0 20px 60px rgba(0,0,0,.25);

}

/*==========================
      BACKGROUND
==========================*/

.bg-circle{

position:absolute;
border-radius:50%;
filter:blur(20px);
opacity:.25;

}

.bg1{

width:300px;
height:300px;
background:#ff7a00;
top:-100px;
left:-80px;

}

.bg2{

width:250px;
height:250px;
background:#3b82f6;
bottom:-80px;
right:-80px;

}

/*==========================
      LOGIN CARD
==========================*/

.login-card{

position:relative;
width:100%;
max-width:430px;
background:#fff;
border-radius:25px;
padding:40px;
box-shadow:var(--shadow);
z-index:5;
animation:fadeIn .7s ease;

}

@keyframes fadeIn{

from{

opacity:0;
transform:translateY(30px);

}

to{

opacity:1;
transform:translateY(0);

}

}

/*==========================
        LOGO
==========================*/

.logo{

display:flex;
justify-content:center;
align-items:center;
margin-bottom:30px;

}

.logo img{

width:140px;
height:auto;
display:block;
object-fit:contain;

}

/*==========================
        TITLE
==========================*/

.title{

text-align:center;
margin-bottom:30px;

}

.title h2{

font-size:32px;
font-weight:700;
color:var(--text);

}

.title span{

color:var(--primary);

}

.title p{

margin-top:10px;
font-size:15px;
color:var(--gray);

}

/*==========================
        FORM
==========================*/

.form-group{

margin-bottom:20px;

}

.form-group label{

display:block;
margin-bottom:8px;
font-size:15px;
font-weight:600;
color:var(--text);

}

.form-control{

width:100%;
height:55px;
padding:0 18px;
border:1px solid var(--border);
border-radius:12px;
font-size:15px;
outline:none;
transition:.3s;

}

.form-control:focus{

border-color:var(--primary);
box-shadow:0 0 0 3px rgba(255,122,0,.15);

}

/*==========================
      SEND OTP BUTTON
==========================*/

.send-btn{

width:100%;
height:55px;
border:none;
border-radius:12px;
background:var(--primary);
color:#fff;
font-size:17px;
font-weight:600;
cursor:pointer;
transition:.3s;

}

.send-btn:hover{

background:var(--primary-dark);

}

/*==========================
      ERROR MESSAGE
==========================*/

.error{

display:none;
margin-top:10px;
font-size:14px;
color:#dc2626;
font-weight:500;

}

/*==========================
      OTP SECTION
==========================*/

.otp-section{

display:none;
margin-top:30px;

}

.otp-title{

text-align:center;
margin-bottom:20px;

}

.otp-title h3{

font-size:22px;
color:var(--text);

}

.otp-title p{

margin-top:8px;
color:var(--gray);

}
/*==========================
        OTP BOXES
==========================*/

.otp-inputs{

display:flex;
justify-content:space-between;
gap:12px;
margin-bottom:25px;

}

.otp-input{

width:60px;
height:60px;
border:2px solid var(--border);
border-radius:12px;
text-align:center;
font-size:24px;
font-weight:700;
outline:none;
transition:.3s;

}

.otp-input:focus{

border-color:var(--primary);
box-shadow:0 0 0 3px rgba(255,122,0,.15);

}

/*==========================
      VERIFY BUTTON
==========================*/

.verify-btn{

width:100%;
height:55px;
border:none;
border-radius:12px;
background:var(--primary);
color:#fff;
font-size:17px;
font-weight:600;
cursor:pointer;
transition:.3s;

}

.verify-btn:hover{

background:var(--primary-dark);

}

/*==========================
      RESEND OTP
==========================*/

.resend{

text-align:center;
margin-top:18px;

}

.resend a{

text-decoration:none;
color:var(--primary);
font-weight:600;
cursor:pointer;

}

.resend a:hover{

text-decoration:underline;

}

/*==========================
      CHANGE NUMBER
==========================*/

.change-number{

text-align:center;
margin-top:15px;

}

.change-number a{

text-decoration:none;
font-size:15px;
color:#2563eb;
font-weight:600;

}

.change-number a:hover{

text-decoration:underline;

}

/*==========================
        BACK BUTTON
==========================*/

.back-home{

margin-top:25px;
text-align:center;

}

.back-home a{

text-decoration:none;
color:#6b7280;
font-size:14px;
font-weight:500;

}

.back-home a:hover{

color:var(--primary);

}

/*==========================
      FOOTER TEXT
==========================*/

.footer-text{

margin-top:30px;
text-align:center;
font-size:13px;
color:#9ca3af;
line-height:22px;

}

/*==========================
      RESPONSIVE
==========================*/

@media(max-width:768px){

.login-card{

width:92%;
padding:30px 25px;

}

.title h2{

font-size:28px;

}

.logo img{

width:75px;

}

.otp-input{

width:52px;
height:52px;
font-size:22px;

}

}

@media(max-width:480px){

.login-card{

padding:25px 20px;

}

.title h2{

font-size:24px;

}

.form-control,
.send-btn,
.verify-btn{

height:50px;

}

.otp-input{

width:45px;
height:50px;
font-size:20px;

}

}

/*==========================
      END CSS
==========================*/

</style>



</head>

<script>

</script>

<body>

<!-- Background -->
<div class="bg-circle bg1"></div>
<div class="bg-circle bg2"></div>

<!-- ===========================
        LOGIN CARD
=========================== -->

<div class="login-card">

    <!-- Logo -->

    <div class="logo">

        <img src="logo.png" alt="Delivery Jobs India Logo">
    </div>

    <!-- Title -->

    <div class="title">

        <h2>Welcome <span>Back</span></h2>

        <p>Login with your Mobile Number</p>

    </div>

    <!-- ===========================
            LOGIN FORM
    =========================== -->

    <form id="loginForm">

        <div class="form-group">

           <label>Mobile Number</label>

            <input
                type="text"
                class="form-control"
                id="loginInput"
                placeholder="Enter Mobile Number"
                required>

            <div class="error" id="loginError">

                Please enter a valid 10 digit Mobile Number.

            </div>

        </div>

        <button type="submit" class="send-btn">

            Send OTP

        </button>

    </form>

    <!-- ===========================
            OTP SECTION
    =========================== -->

    <div class="otp-section" id="otpSection">

        <div class="otp-title">

            <h3>OTP Verification</h3>

            <p>

                Enter the 4 digit OTP sent to

                <strong id="userValue"></strong>

            </p>

        </div>

        <div class="otp-inputs">

            <input type="text" maxlength="1" class="otp-input">

            <input type="text" maxlength="1" class="otp-input">

            <input type="text" maxlength="1" class="otp-input">

            <input type="text" maxlength="1" class="otp-input">

        </div>

        <div class="error" id="otpError">

            Invalid OTP. Please try again.

        </div>

        <button class="verify-btn" id="verifyBtn">

            Verify OTP

        </button>

        <div class="resend">

            <a href="#" id="resendOtp">

                Resend OTP

            </a>

        </div>

        <div class="change-number">

            <a href="#" id="changeNumber">

                Change Mobile Number 

            </a>

        </div>

    </div>

    <!-- ===========================
            BACK BUTTON
    =========================== -->

    <div class="back-home">

        <a href="index.html">

            ← Back to Home

        </a>

    </div>

    <!-- Footer -->

    <div class="footer-text">

        © 2026 Delivery Jobs India <br>

        Secure Login with OTP

    </div>


</div>

<script>

   
// ==============================
// Mobile Validation
// ==============================

const loginForm = document.getElementById("loginForm");
const loginInput = document.getElementById("loginInput");
const loginError = document.getElementById("loginError");

const userValue = document.getElementById("userValue");
const otpSection = document.getElementById("otpSection");



const mobilePattern=/^[6-9]\d{9}$/;
loginForm.addEventListener("submit", function (e) {

    e.preventDefault();

    const mobile = loginInput.value.trim();

    if (!mobilePattern.test(mobile)) {
        loginError.style.display = "block";
        return;
    }

    loginError.style.display = "none";

    userValue.innerHTML = "+91 " + mobile;

    loginForm.style.display = "none";
    otpSection.style.display = "block";

    alert("Demo OTP : 1234");

});


// ==============================
// OTP Auto Move
// ==============================

const otpInputs=document.querySelectorAll(".otp-input");

otpInputs.forEach((input,index)=>{

input.addEventListener("input",function(){

this.value=this.value.replace(/[^0-9]/g,'');

if(this.value.length==1 && index<otpInputs.length-1){

otpInputs[index+1].focus();

}

});

input.addEventListener("keydown",function(e){

if(e.key==="Backspace" && this.value==="" && index>0){

otpInputs[index-1].focus();

}

});

});





// ==============================
// Resend OTP
// ==============================

document.getElementById("resendOtp").addEventListener("click",function(e){

e.preventDefault();

alert("OTP Sent Successfully.\n\nDemo OTP : 1234");

});


// ==============================
// Change Number
// ==============================

document.getElementById("changeNumber").addEventListener("click",function(e){

e.preventDefault();

loginForm.reset();

otpInputs.forEach(box=>box.value="");

otpSection.style.display="none";

loginForm.style.display="block";

loginInput.focus();

});


// ==============================
// Prevent Login Page After Login
// ==============================
document.getElementById("verifyBtn").addEventListener("click", function () {

    const otp = [...document.querySelectorAll(".otp-input")]
        .map(x => x.value)
        .join("");

    if (otp !== "1234") {

        document.getElementById("otpError").style.display = "block";
        return;

    }
document.getElementById("otpError").style.display = "none";

    localStorage.setItem("isLoggedIn", "true");
localStorage.setItem("userId", crypto.randomUUID());
localStorage.setItem("userMobile", loginInput.value);
localStorage.setItem("userName", "Delivery Partner");

    alert("Login Successful");

    window.location.href = "home.html";

});
</script>

</body>
</html>
