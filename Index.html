<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Delivery Jobs India</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, sans-serif;
}

body{
    background:#f4f4f4;
}

.container{
    width:400px;
    background:white;
    margin:80px auto;
    padding:30px;
    border-radius:12px;
    box-shadow:0 0 15px rgba(0,0,0,0.2);
}

h1{
    text-align:center;
    color:#007bff;
    margin-bottom:10px;
}

h2{
    text-align:center;
    margin-bottom:20px;
}

input{
    width:100%;
    padding:12px;
    margin:10px 0;
    border:1px solid #ccc;
    border-radius:5px;
}

button{
    width:100%;
    padding:12px;
    background:#007bff;
    color:white;
    border:none;
    border-radius:5px;
    cursor:pointer;
    font-size:16px;
}

button:hover{
    background:#0056b3;
}

p{
    text-align:center;
    margin-top:15px;
}

a{
    text-decoration:none;
    color:#007bff;
}

.error{
    color:red;
    font-size:14px;
    display:block;
    margin-top:-5px;
    margin-bottom:5px;
}
</style>
</head>

<body>

<div class="container">

<h1>Delivery Jobs India</h1>

<h2>Create Account</h2>

<input type="text"
       id="fullname"
       placeholder="Full Name"
       maxlength="30">
<span id="nameError" class="error"></span>

<input type="email"
       id="email"
       placeholder="Email Address">

<input type="tel"
       id="phone"
       placeholder="Phone Number"
       maxlength="10">
<span id="phoneError" class="error"></span>

<input type="password"
       id="password"
       placeholder="Password">

<input type="password"
       id="confirmPassword"
       placeholder="Confirm Password">

<button onclick="validateForm()">
Create Account
</button>

<p>
Already have an account?
<a href="login.html">Login</a>
</p>

</div>

<script>

function validateForm(){

    let fullname =
    document.getElementById("fullname").value.trim();

    let phone =
    document.getElementById("phone").value.trim();

    document.getElementById("nameError").innerHTML = "";
    document.getElementById("phoneError").innerHTML = "";

    let valid = true;

    // Full Name Validation
    if(fullname === ""){
        document.getElementById("nameError").innerHTML =
        "Enter your full name";
        valid = false;
    }

    // Phone Number Validation
    let phonePattern = /^[6-9][0-9]{9}$/;

    if(!phonePattern.test(phone)){
        document.getElementById("phoneError").innerHTML =
        "Please enter valid Phone Number";
        valid = false;
    }

    if(valid){
        alert("Account Created Successfully");
    }
}

</script>

</body>
</html>
